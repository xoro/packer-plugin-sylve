# Nightly: scheduled quality checks and acceptance tests on a self-hosted
# macOS runner with access to a live Sylve instance.
# The schedule trigger always runs on the default branch (main), so every
# checkout step explicitly targets the development branch.

name: nightly

on:
  schedule:
    # Run at 20:00 UTC every night
    - cron: "0 20 * * *"
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch to test"
        required: false
        default: "development"

permissions:
  contents: read

jobs:
  quality-checks:
    name: Quality Checks
    runs-on: [self-hosted, macOS, ARM64]
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || 'development' }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run all quality checks
        run: ./bin/run_all_quality_checks.sh

  acceptance-tests:
    name: Acceptance Tests
    needs: quality-checks
    runs-on: [self-hosted, macOS, ARM64]
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SYLVE_HOST: ${{ secrets.SYLVE_HOST }}
      SYLVE_AUTH_TYPE: ${{ secrets.SYLVE_AUTH_TYPE }}
      SYLVE_USER: ${{ secrets.SYLVE_USER }}
      SYLVE_PASSWORD: ${{ secrets.SYLVE_PASSWORD }}
      SYLVE_SWITCH: ${{ secrets.SYLVE_SWITCH }}
      SYLVE_POOL: ${{ secrets.SYLVE_POOL }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - builder: iso
            os-name: freebsd
          - builder: vm
            os-name: freebsd
          - builder: vm
            os-name: windows
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || 'development' }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run example (${{ matrix.builder }} ${{ matrix.os-name }})
        run: ./bin/run_example.sh "${{ matrix.builder }}" "${{ matrix.os-name }}"
